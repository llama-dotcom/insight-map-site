<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manufacturers — HP Subsidy Monitor</title>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js" crossorigin="anonymous"></script>
<script src="shared.js"></script>
<style>
:root,[data-theme="dark"]{--bg:#0f1629;--bg2:#141d33;--card:rgba(20,29,51,0.7);--glass:rgba(25,36,60,0.5);--glass-b:rgba(90,110,150,0.22);--accent:#38bdf8;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--orange:#fb923c;--text:#e8ecf4;--muted:#a8b5c8;--dim:#7b8aa0;--radius:14px;}
[data-theme="light"]{--bg:#f5f0e8;--bg2:#faf7f2;--card:rgba(250,247,242,0.9);--glass:rgba(250,247,240,0.8);--glass-b:rgba(190,180,165,0.4);--accent:#0066b3;--green:#15803d;--red:#b91c1c;--yellow:#92600a;--orange:#c2410c;--text:#1a1510;--muted:#4a4035;--dim:#6b5f52;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}
a{color:var(--accent);text-decoration:none;}
.container{max-width:1200px;margin:0 auto;padding:0 20px;}
.gc{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-b);border-radius:var(--radius);transition:all 0.2s;}

.page-intro{padding:14px 0 8px;}
.page-intro h2{font-size:1rem;color:var(--text);font-weight:600;margin-bottom:4px;}
.page-intro p{font-size:0.82rem;color:var(--dim);}

.mfg-section{margin-bottom:20px;}
.mfg-header{display:flex;align-items:center;gap:10px;padding:12px 0 8px;}
.mfg-name{font-size:0.95rem;font-weight:700;color:var(--text);}
.mfg-count{font-size:0.7rem;color:var(--dim);background:rgba(100,116,139,0.12);padding:2px 8px;border-radius:5px;}

.n-card{padding:12px 16px;margin-bottom:6px;border-left:3px solid var(--accent);}
.n-hi{border-left-color:var(--red);}
.n-me{border-left-color:var(--orange);}
.n-mt{display:flex;justify-content:space-between;font-size:0.68rem;color:var(--dim);margin-bottom:3px;}
.n-tt{font-size:0.84rem;font-weight:600;color:var(--text);margin-bottom:2px;}
.n-ds{font-size:0.76rem;color:var(--muted);line-height:1.5;}
.n-sr{margin-top:4px;}
.n-sr a{font-size:0.7rem;color:var(--accent);}
.imp{padding:2px 6px;border-radius:4px;font-size:0.68rem;font-weight:700;text-transform:uppercase;}
.imp-c{background:rgba(248,113,113,0.12);color:var(--red);}
.imp-m{background:rgba(251,146,60,0.12);color:var(--orange);}
.imp-i{background:rgba(56,189,248,0.12);color:var(--accent);}

.empty-state{text-align:center;padding:60px 20px;color:var(--dim);font-size:0.88rem;}

footer{text-align:center;padding:20px 0;border-top:1px solid var(--glass-b);color:var(--dim);font-size:0.72rem;margin-top:20px;}
@media(max-width:900px){.container{padding:0 12px;}}
</style>
</head>
<body>

<script>initHeader('manufacturers');</script>

<div class="container">

<div class="page-intro">
  <h2>Heat Pump Manufacturers — Product News & Announcements</h2>
  <p>Latest news on new models, product launches, partnerships, and factory developments. Auto-updated daily from global news sources.</p>
</div>

<div id="content">
  <div class="empty-state">Loading manufacturer news...</div>
</div>

</div>

<footer>
  <p>HP Subsidy Monitor · Auto-updated daily · <a href="/impressum.html">Impressum</a> · <a href="/datenschutz.html">Datenschutz</a></p>
</footer>

<script>
const SB_URL='https://eyjlrfoaefleugamcvuo.supabase.co';
const SB_KEY='sb_publishable_aTjldMpez0BhB1L5ubPuNA_KaOGXG1q';

async function loadNews(){
  try {
    const res = await fetch(`${SB_URL}/rest/v1/news?category=eq.manufacturer&order=created_at.desc&limit=100`,
      { headers: { 'apikey': SB_KEY, 'Authorization': `Bearer ${SB_KEY}` } });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const news = await res.json();

    if (!news.length) {
      document.getElementById('content').innerHTML = '<div class="empty-state">No manufacturer news yet. News will appear after the next daily update (08:00 CET).</div>';
      return;
    }

    // Extract manufacturer name from title ("ManufacturerName: headline")
    // or from country_id if it's a manufacturer tag
    const byMfg = {};
    for (const n of news) {
      let mfg = 'Other';
      // Try extracting from title pattern "Name: headline"
      const colonIdx = (n.title || '').indexOf(':');
      if (colonIdx > 0 && colonIdx < 30) {
        mfg = n.title.slice(0, colonIdx).trim();
      }
      if (!byMfg[mfg]) byMfg[mfg] = [];
      byMfg[mfg].push(n);
    }

    // Sort manufacturers by number of articles (most active first)
    const sorted = Object.entries(byMfg).sort((a, b) => b[1].length - a[1].length);

    let html = '';
    for (const [mfg, articles] of sorted) {
      html += `<div class="mfg-section">`;
      html += `<div class="mfg-header"><span class="mfg-name">${mfg}</span><span class="mfg-count">${articles.length} article${articles.length > 1 ? 's' : ''}</span></div>`;
      for (const n of articles.slice(0, 6)) {
        const ic = n.impact === 'critical' ? 'n-hi' : n.impact === 'medium' ? 'n-me' : '';
        const bc = n.impact === 'critical' ? 'imp-c' : n.impact === 'medium' ? 'imp-m' : 'imp-i';
        // Remove manufacturer prefix from title for display (it's already in the section header)
        let displayTitle = n.title || '';
        if (displayTitle.indexOf(':') > 0 && displayTitle.indexOf(':') < 30) {
          displayTitle = displayTitle.slice(displayTitle.indexOf(':') + 1).trim();
        }
        html += `<div class="gc n-card ${ic}">`;
        html += `<div class="n-mt"><span>${n.date || ''}</span><span class="imp ${bc}">${n.impact || 'info'}</span></div>`;
        html += `<div class="n-tt">${displayTitle}</div>`;
        html += `<div class="n-ds">${n.description || ''}</div>`;
        if (n.source_url) html += `<div class="n-sr"><a href="${n.source_url}" target="_blank">${n.source_name || 'Source'} →</a></div>`;
        html += `</div>`;
      }
      html += `</div>`;
    }

    document.getElementById('content').innerHTML = html;
    console.log(`✅ Loaded ${news.length} manufacturer news, ${sorted.length} manufacturers`);
  } catch (e) {
    document.getElementById('content').innerHTML = `<div class="empty-state">Could not load news. Will retry on next page visit.</div>`;
    console.warn('Manufacturer news load failed:', e);
  }
}

// Theme
function onThemeChange(){}
(function(){ const s = localStorage.getItem('hp-theme'); if (s) document.documentElement.setAttribute('data-theme', s); })();

loadNews();
lucide.createIcons();
</script>
</body>
</html>
