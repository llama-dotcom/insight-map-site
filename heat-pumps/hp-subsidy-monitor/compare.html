<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compare Countries — HP Subsidy Monitor</title>
<script src="https://unpkg.com/lucide@latest"></script>
<style>
:root,[data-theme="dark"]{--bg:#0f1629;--card:rgba(20,29,51,0.7);--glass:rgba(25,36,60,0.5);--glass-b:rgba(90,110,150,0.22);--accent:#38bdf8;--green:#4ade80;--red:#f87171;--yellow:#fbbf24;--text:#e8ecf4;--muted:#a8b5c8;--dim:#7b8aa0;--radius:14px;--tbl-even:rgba(20,30,50,0.3);}
[data-theme="light"]{--bg:#f5f7fa;--card:rgba(255,255,255,0.85);--glass:rgba(255,255,255,0.7);--glass-b:rgba(200,210,225,0.5);--accent:#0078d4;--green:#16a34a;--red:#dc2626;--yellow:#ca8a04;--text:#1e293b;--muted:#475569;--dim:#64748b;--tbl-even:rgba(241,245,249,0.6);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;padding:40px 20px;}
.container{max-width:1000px;margin:0 auto;}
a{color:var(--accent);text-decoration:none;}a:hover{text-decoration:underline;}
h1{font-size:1.6rem;font-weight:700;color:white;margin-bottom:6px;}
.sub{font-size:0.82rem;color:var(--dim);margin-bottom:24px;}
.back{display:inline-block;margin-bottom:20px;font-size:0.82rem;color:var(--dim);}
.sel-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:center;}
select{padding:8px 14px;border:1px solid var(--glass-b);border-radius:8px;background:var(--glass);color:var(--text);font-size:0.85rem;min-width:180px;}
select:focus{outline:none;border-color:var(--accent);}
.btn{padding:8px 16px;border:1px solid var(--glass-b);border-radius:8px;background:var(--glass);color:var(--accent);cursor:pointer;font-size:0.82rem;font-weight:500;transition:all 0.2s;}
.btn:hover{background:rgba(56,189,248,0.1);border-color:var(--accent);}
.gc{background:var(--glass);backdrop-filter:blur(16px);border:1px solid var(--glass-b);border-radius:var(--radius);transition:all 0.2s;}
table{width:100%;border-collapse:collapse;font-size:0.82rem;}
th{padding:10px 14px;text-align:left;color:var(--dim);font-size:0.68rem;text-transform:uppercase;letter-spacing:0.6px;border-bottom:1px solid var(--glass-b);font-weight:600;}
td{padding:10px 14px;border-bottom:1px solid rgba(51,65,85,0.2);}
tr:nth-child(even){background:rgba(15,23,42,0.3);}
.best{color:var(--green);font-weight:600;}
.worst{color:var(--red);}
.mono{font-family:Menlo,Consolas,monospace;font-weight:600;}
.empty{text-align:center;padding:40px;color:var(--dim);font-size:0.9rem;}
.bar{height:6px;border-radius:3px;margin-top:4px;}
footer{text-align:center;margin-top:40px;padding-top:20px;border-top:1px solid var(--glass-b);font-size:0.7rem;color:var(--dim);}
@media(max-width:768px){.sel-row{flex-direction:column;} select{width:100%;}}
</style>
</head>
<body>
<div class="container">

<nav style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;">
  <a href="index.html" style="padding:5px 12px;border-radius:6px;font-size:0.78rem;color:var(--dim);background:rgba(30,41,59,0.3);text-decoration:none;">Dashboard</a>
  <a href="compare.html" style="padding:5px 12px;border-radius:6px;font-size:0.78rem;color:white;background:rgba(56,189,248,0.15);text-decoration:none;">Compare</a>
  <a href="energy-prices.html" style="padding:5px 12px;border-radius:6px;font-size:0.78rem;color:var(--dim);background:rgba(30,41,59,0.3);text-decoration:none;">Prices</a>
  <a href="about.html" style="padding:5px 12px;border-radius:6px;font-size:0.78rem;color:var(--dim);background:rgba(30,41,59,0.3);text-decoration:none;">About</a>
  <button onclick="toggleTheme()" style="padding:5px 12px;border-radius:6px;font-size:0.72rem;color:var(--dim);background:var(--glass);border:1px solid var(--glass-b);cursor:pointer;">Toggle Theme</button>
</nav>
<h1><i data-lucide="git-compare" style="width:22px;height:22px;color:var(--accent);display:inline;vertical-align:middle;"></i> Compare Countries</h1>
<p class="sub">Select 2–5 countries to compare subsidies, energy prices, and market data side by side.</p>

<div class="sel-row">
  <select id="s1"><option value="">Select country 1...</option></select>
  <select id="s2"><option value="">Select country 2...</option></select>
  <select id="s3"><option value="">Select country 3 (optional)...</option></select>
  <select id="s4"><option value="">Select country 4 (optional)...</option></select>
  <select id="s5"><option value="">Select country 5 (optional)...</option></select>
  <button class="btn" onclick="compare()"><i data-lucide="bar-chart-3" style="width:14px;height:14px;display:inline;vertical-align:middle;"></i> Compare</button>
</div>

<div id="result"></div>

<footer>
  <p>HP Subsidy Monitor · <a href="index.html">Dashboard</a> · <a href="about.html">About</a> · <a href="/impressum.html">Impressum</a> · <a href="/datenschutz.html">Datenschutz</a></p>
</footer>
</div>

<script>
const C=[
  {n:"Germany",f:"🇩🇪",s:299,yr:2025,ms:23500,sp:"BEG/KfW 458",e:0.384,ga:0.122,r:3.14,pen:"~80",a2a:false,src:"BWP"},
  {n:"France",f:"🇫🇷",s:179,yr:2025,ms:11000,sp:"MaPrimeRénov'",e:0.266,ga:0.130,r:2.05,pen:"N/A",a2a:false,src:"Uniclima"},
  {n:"Netherlands",f:"🇳🇱",s:126,yr:2025,ms:13000,sp:"ISDE",e:0.290,ga:0.162,r:1.79,pen:"~90",a2a:false,src:"VWP"},
  {n:"UK",f:"🇬🇧",s:110,yr:2025,ms:8800,sp:"BUS",e:0.285,ga:0.067,r:4.28,pen:"~10",a2a:false,src:"HPA"},
  {n:"Italy",f:"🇮🇹",s:348,yr:2024,ms:15000,sp:"Conto Termico",e:0.329,ga:0.124,r:2.65,pen:"N/A",a2a:true,src:"EHPA"},
  {n:"Belgium",f:"🇧🇪",s:111,yr:2025,ms:6000,sp:"Regional",e:0.330,ga:0.120,r:2.75,pen:"N/A",a2a:true,src:"EHPA"},
  {n:"Sweden",f:"🇸🇪",s:100,yr:2024,ms:5500,sp:"Energy Grant",e:0.096,ga:0.213,r:0.45,pen:"~400",a2a:false,src:"SKVP"},
  {n:"Poland",f:"🇵🇱",s:80,yr:2025,ms:31400,sp:"Czyste Powietrze",e:0.256,ga:0.050,r:5.12,pen:"N/A",a2a:false,src:"PORT PC"},
  {n:"Spain",f:"🇪🇸",s:1380,yr:2024,ms:6000,sp:"PRTR+IRPF",e:0.230,ga:0.095,r:2.42,pen:"N/A",a2a:true,src:"AFEC"},
  {n:"Austria",f:"🇦🇹",s:36,yr:2025,ms:7500,sp:"Sanierungsoffensive",e:0.280,ga:0.110,r:2.55,pen:"~130",a2a:false,src:"WPA"},
  {n:"Turkey",f:"🇹🇷",s:0,yr:0,ms:0,sp:"None",e:0.090,ga:0.035,r:2.57,pen:"N/A",a2a:true,src:"N/A"},
  {n:"Switzerland",f:"🇨🇭",s:30,yr:2024,ms:10500,sp:"Gebäudeprogramm",e:0.270,ga:0.130,r:2.08,pen:"~100",a2a:false,src:"FWS"},
  {n:"Czech Republic",f:"🇨🇿",s:18,yr:2024,ms:6000,sp:"NZÚ",e:0.350,ga:0.107,r:3.27,pen:"~70",a2a:false,src:"EHPA"},
  {n:"Greece",f:"🇬🇷",s:18,yr:2024,ms:5000,sp:"Exoikonomo",e:0.200,ga:0.085,r:2.35,pen:"N/A",a2a:true,src:"EHPA est."},
  {n:"Denmark",f:"🇩🇰",s:16,yr:2025,ms:3620,sp:"Varmepumpepuljen",e:0.290,ga:0.120,r:2.42,pen:"N/A",a2a:false,src:"VPI"},
  {n:"Finland",f:"🇫🇮",s:15.7,yr:2025,ms:6000,sp:"ARA Grant",e:0.080,ga:null,r:null,pen:"~30",a2a:false,src:"SULPU"},
  {n:"Ireland",f:"🇮🇪",s:4.4,yr:2025,ms:6500,sp:"SEAI Grant",e:0.310,ga:0.095,r:3.26,pen:"N/A",a2a:false,src:"SEAI"},
  {n:"Slovenia",f:"🇸🇮",s:13,yr:2024,ms:5000,sp:"Eco Fund",e:0.195,ga:0.075,r:2.60,pen:"N/A",a2a:true,src:"EHPA est."},
  {n:"Romania",f:"🇷🇴",s:10,yr:2024,ms:8000,sp:"Casa Verde",e:0.175,ga:0.048,r:3.65,pen:"N/A",a2a:true,src:"EHPA est."},
  {n:"Hungary",f:"🇭🇺",s:9,yr:2025,ms:12500,sp:"Rural HP",e:0.110,ga:0.038,r:2.89,pen:"N/A",a2a:false,src:"est."},
  {n:"Portugal",f:"🇵🇹",s:0,yr:0,ms:15000,sp:"E-Lar",e:0.220,ga:0.110,r:2.00,pen:"N/A",a2a:true,src:"N/A"},
  {n:"Luxembourg",f:"🇱🇺",s:1,yr:2024,ms:24000,sp:"Klimabonus",e:0.220,ga:0.080,r:2.75,pen:"N/A",a2a:true,src:"EHPA est."},
  {n:"Bulgaria",f:"🇧🇬",s:8,yr:2024,ms:5000,sp:"NRRP",e:0.115,ga:0.055,r:2.09,pen:"N/A",a2a:true,src:"EHPA est."},
  {n:"Slovakia",f:"🇸🇰",s:0,yr:0,ms:4370,sp:"Zelená dom.",e:0.210,ga:0.065,r:3.23,pen:"N/A",a2a:true,src:"N/A"},
  {n:"Croatia",f:"🇭🇷",s:8,yr:2024,ms:8500,sp:"FZOEU",e:0.175,ga:0.055,r:3.18,pen:"N/A",a2a:true,src:"EHPA est."},
  {n:"Latvia",f:"🇱🇻",s:4,yr:2024,ms:5000,sp:"EKII",e:0.250,ga:0.055,r:4.55,pen:"N/A",a2a:true,src:"EHPA est."},
  {n:"Serbia-Montenegro",f:"🇷🇸",s:0,yr:0,ms:1700,sp:"Municipal",e:0.085,ga:0.042,r:2.02,pen:"N/A",a2a:true,src:"N/A"},
  {n:"Ukraine",f:"🇺🇦",s:0,yr:0,ms:3000,sp:"IQ Energy",e:0.060,ga:0.035,r:1.71,pen:"N/A",a2a:true,src:"N/A"},
  {n:"Bosnia-Herzegovina",f:"🇧🇦",s:0,yr:0,ms:1000,sp:"Limited",e:0.095,ga:0.040,r:2.38,pen:"N/A",a2a:true,src:"N/A"}
];

// Populate selects
const sorted=[...C].sort((a,b)=>a.n.localeCompare(b.n));
for(let i=1;i<=5;i++){
  const sel=document.getElementById('s'+i);
  sorted.forEach(c=>{const o=document.createElement('option');o.value=c.n;o.textContent=c.f+' '+c.n;sel.appendChild(o);});
}

function compare(){
  const sel=[];
  for(let i=1;i<=5;i++){const v=document.getElementById('s'+i).value;if(v)sel.push(v);}
  if(sel.length<2){document.getElementById('result').innerHTML='<div class="empty">Please select at least 2 countries.</div>';return;}
  const cs=sel.map(n=>C.find(c=>c.n===n)).filter(Boolean);
  const maxMs=Math.max(...cs.map(c=>c.ms));
  const maxE=Math.max(...cs.map(c=>c.e));
  const minE=Math.min(...cs.map(c=>c.e));

  let h=`<div class="gc" style="padding:0;overflow:hidden;margin-top:10px;"><table>`;
  h+=`<thead><tr><th>Metric</th>${cs.map(c=>`<th>${c.f} ${c.n}</th>`).join('')}</tr></thead><tbody>`;

  // Subsidy
  h+=`<tr><td><strong>Max Subsidy</strong></td>${cs.map(c=>{
    const best=c.ms===maxMs&&maxMs>0?' best':'';
    return`<td><span class="mono ${best}">€${c.ms.toLocaleString()}</span><div class="bar" style="width:${maxMs>0?c.ms/maxMs*100:0}%;background:var(--green);"></div></td>`;
  }).join('')}</tr>`;

  h+=`<tr><td>Program</td>${cs.map(c=>`<td>${c.sp}</td>`).join('')}</tr>`;
  h+=`<tr><td><strong>Electricity</strong></td>${cs.map(c=>{
    const cl=c.e===minE?' best':c.e===maxE?' worst':'';
    return`<td class="mono${cl}">€${c.e.toFixed(3)}/kWh</td>`;
  }).join('')}</tr>`;
  h+=`<tr><td><strong>Gas</strong></td>${cs.map(c=>`<td class="mono">${c.ga?'€'+c.ga.toFixed(3)+'/kWh':'N/A'}</td>`).join('')}</tr>`;
  h+=`<tr><td><strong>Elec/Gas Ratio</strong></td>${cs.map(c=>{
    const cl=c.r&&c.r>3.5?'worst':c.r&&c.r<2?'best':'';
    return`<td class="mono ${cl}">${c.r?c.r.toFixed(2)+'x':'N/A'}</td>`;
  }).join('')}</tr>`;
  h+=`<tr><td><strong>Market Size</strong></td>${cs.map(c=>`<td class="mono">${c.s>0?c.s+'k ('+c.yr+')':'N/A'}${c.a2a&&c.s>0?' <span style="font-size:0.65rem;color:var(--yellow);">incl.A2A</span>':''}</td>`).join('')}</tr>`;
  h+=`<tr><td><strong>HP Penetration</strong></td>${cs.map(c=>`<td class="mono">${c.pen}/1000 hh</td>`).join('')}</tr>`;
  h+=`<tr><td>Data Source</td>${cs.map(c=>`<td style="font-size:0.76rem;color:var(--dim);">${c.src}</td>`).join('')}</tr>`;

  h+=`</tbody></table></div>`;

  // Best/worst highlights
  h+=`<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">`;
  const bestSub=cs.reduce((a,b)=>a.ms>b.ms?a:b);
  const cheapElec=cs.reduce((a,b)=>a.e<b.e?a:b);
  h+=`<div class="gc" style="padding:12px;flex:1;min-width:200px;"><div style="font-size:0.7rem;color:var(--dim);text-transform:uppercase;">Highest Subsidy</div><div style="font-size:1rem;font-weight:600;color:var(--green);">${bestSub.f} ${bestSub.n} — €${bestSub.ms.toLocaleString()}</div></div>`;
  h+=`<div class="gc" style="padding:12px;flex:1;min-width:200px;"><div style="font-size:0.7rem;color:var(--dim);text-transform:uppercase;">Cheapest Electricity</div><div style="font-size:1rem;font-weight:600;color:var(--green);">${cheapElec.f} ${cheapElec.n} — €${cheapElec.e.toFixed(3)}/kWh</div></div>`;
  h+=`</div>`;

  document.getElementById('result').innerHTML=h;
}

(function(){const s=localStorage.getItem('hp-theme');if(s)document.documentElement.setAttribute('data-theme',s);})();
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme')||'dark';const n=c==='dark'?'light':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('hp-theme',n);}
lucide.createIcons();
</script>
</body>
</html>
